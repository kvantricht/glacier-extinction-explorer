<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Swiss Glacier Extinction Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="./src/style.css?v=4" />
  </head>
  <body>
    <div id="app-shell">
      <header class="app-header">
        <div class="header-copy">
          <p class="eyebrow">Swiss Glacier Explorer</p>
          <h1>Swiss Glacier Extinction Explorer</h1>
        </div>
      </header>

      <aside class="control-panel" id="control-panel">
        <div class="panel-toolbar">
          <h2 class="panel-title">Controls</h2>
          <div class="toolbar-actions">
            <button id="reset-view-button" class="ghost-button compact-button" type="button">
              Reset
            </button>
            <button
              id="panel-toggle-button"
              class="ghost-button compact-button"
              type="button"
              aria-expanded="true"
              aria-controls="control-panel-body"
            >
              Collapse
            </button>
          </div>
        </div>

        <div id="control-panel-body" class="control-panel-body">
          <section>
            <h2>Explore</h2>
            <p class="panel-copy">
              Pan and zoom across Switzerland, switch emissions scenarios, then
              hover or click a glacier to inspect extinction timing and metadata.
            </p>
          </section>

          <section>
            <label for="scenario-select">Active scenario</label>
            <select id="scenario-select" aria-label="Select emissions scenario"></select>
            <p id="scenario-stats" class="microcopy"></p>
          </section>

          <section>
            <h2>Glacier overlay</h2>
            <label class="inline-toggle" for="overlay-visible-input">
              <input id="overlay-visible-input" type="checkbox" checked />
              <span>Show glacier layer</span>
            </label>
            <label for="overlay-opacity-input">Overlay opacity</label>
            <div class="range-row">
              <input id="overlay-opacity-input" type="range" min="15" max="100" value="75" />
              <output id="overlay-opacity-value" for="overlay-opacity-input">75%</output>
            </div>
          </section>

          <section id="search-section">
            <label for="search-input">Find glacier</label>
            <div class="search-box">
              <input
                id="search-input"
                type="search"
                placeholder="Search by glacier name"
                autocomplete="off"
                aria-autocomplete="list"
                aria-controls="search-results"
              />
              <div id="search-results" class="search-results" hidden></div>
            </div>
            <p id="search-status" class="microcopy"></p>
          </section>

          <section>
            <div class="legend-header">
              <h2>Legend</h2>
              <span id="active-scenario-chip" class="scenario-chip"></span>
            </div>
            <div id="legend" class="legend"></div>
          </section>

        </div>
      </aside>

      <div id="status-box" class="loading-overlay" aria-live="polite">
        <div class="loading-card">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p id="status-message" class="loading-message">Loading glaciers</p>
        </div>
      </div>

      <main id="map" aria-label="Map of Swiss glaciers"></main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script type="module" src="./src/main.js?v=30"></script>
  </body>
</html>
